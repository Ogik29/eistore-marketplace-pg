<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />

    <title>Ei Store</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link href="style/main.css" rel="stylesheet" />
  </head>

  <body>
    <div class="page-dashboard">
      <div class="d-flex" id="wrapper" data-aos="fade-right">
        <!-- sidebar -->
        <div class="border-right" id="sidebar-wrapper">
          <div class="sidebar-heading text-center">
            <img src="/images/dashboard-store-logo.svg" alt="" class="my-4" />
          </div>
          <!-- untuk menambahkan menu pada sidebar -->
          <div class="list-group list-group-flush">
            <a href="/dashboard.html" class="list-group-item list-group-item-action">Dashboard</a>
            <a href="/dashboard-products.html" class="list-group-item list-group-item-action">My Products</a>
            <a href="/dashboard-transactions.html" class="list-group-item list-group-item-action">Transactions</a>
            <a href="/dashboard-settings.html" class="list-group-item list-group-item-action">Store Settings</a>
            <a href="/dashboard-account.html" class="list-group-item list-group-item-action active">My Account</a>
            <a href="/index.html" class="list-group-item list-group-item-action">Sign Out</a>
          </div>
        </div>

        <!-- page content -->
        <div id="page-content-wrapper">
          <!-- navigation -->
          <nav class="navbar navbar-expand-lg navbar-light navbar-store fixed-top" data-aos="fade-down">
            <div class="container-fluid">
              <button class="btn btn-secondary d-md-none mr-auto mr-2" id="menu-toggle">&laquo; Menu</button>
              <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- desktop menu -->
                <ul class="navbar-nav d-none d-lg-flex ml-auto">
                  <!-- fungsi d-none adalah agar tampilan tidak muncul di versi mobile -->
                  <li class="nav-item dropdown">
                    <a href="#" class="nav-link" id="navbarDropDown" role="button" data-toggle="dropdown">
                      <img src="/images/daemon_pfp.jpg" alt="" class="rounded-circle mr-2 profile-picture" />
                      Hi, Wak
                    </a>
                    <div class="dropdown-menu">
                      <a href="/dashboard.html" class="dropdown-item">Dashboard</a>
                      <a href="/dashboard-account.html" class="dropdown-item">Setting</a>
                      <div class="dropdown-divider"></div>
                      <a href="/" class="dropdown-item">Logout</a>
                    </div>
                  </li>

                  <li class="nav-item">
                    <a href="#" class="nav-link d-inline-block mt-2">
                      <img src="/images/icon-cart-filled.svg" alt="" />
                      <div class="card-badge">3</div>
                      <!-- style css ada di file _navbar.scss -->
                    </a>
                  </li>
                </ul>

                <!-- mobile menu -->
                <ul class="navbar-nav d-block d-lg-none">
                  <!-- agar hanya muncul dilayar kecil (layar mobile) maka diberikan class d-lg-none agar tidak muncul di large screen -->
                  <li class="nav-item">
                    <a href="#" class="nav-link">Hi, Wak</a>
                  </li>

                  <li class="nav-item">
                    <a href="#" class="nav-link d-inline-block">Cart</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>

          <!-- section content -->
          <div class="section-content section-dashboard-home" data-aos="fade-up">
            <div class="container-fluid">
              <div class="dashboard-heading">
                <h2 class="dashboard-title">My Account</h2>
                <p class="dashboard-subtitle">Update your current profile</p>
              </div>
              <div class="dashboard-content">
                <div class="row">
                  <div class="col-12">
                    <form action="">
                      <div class="card">
                        <div class="card-body">
                          <div class="row">
                            <div class="col-md-6">
                              <!-- diberikan col-md-6 agar form-groupnya bisa 2 form karena 1 halaman maksimal 12 col -->
                              <div class="form-group">
                                <label for="name">Your Name</label>
                                <input type="text" class="form-control" id="name" name="name" value="Rusdimus Prime" />
                              </div>
                            </div>

                            <div class="col-md-6">
                              <div class="form-group">
                                <label for="email">Your Email</label>
                                <input type="email" class="form-control" id="email" name="email" value="ambaleon@gmail.com" />
                              </div>
                            </div>

                            <div class="col-md-6">
                              <!-- diberikan col-md-6 agar form-groupnya bisa 2 form karena 1 halaman maksimal 12 col -->
                              <div class="form-group">
                                <label for="addressOne">Address 1</label>
                                <input type="text" class="form-control" id="addressOne" name="addressOne" value="Yungawi" />
                              </div>
                            </div>

                            <div class="col-md-6">
                              <div class="form-group">
                                <label for="addressTwo">Address 2</label>
                                <input type="text" class="form-control" id="addressTwo" name="addressTwo" value="Rongawi 1" />
                              </div>
                            </div>

                            <div class="col-md-4">
                              <div class="form-group">
                                <label for="province">Province</label>
                                <select name="province" id="province" class="form-control">
                                  <option value="East Java">Jawir Timur</option>
                                </select>
                              </div>
                            </div>

                            <div class="col-md-4">
                              <div class="form-group">
                                <label for="city">City</label>
                                <select name="city" id="city" class="form-control">
                                  <option value="Rongawi">Rongawi</option>
                                </select>
                              </div>
                            </div>

                            <div class="col-md-4">
                              <div class="form-group">
                                <label for="postalCode">Postal Code</label>
                                <input type="text" class="form-control" id="postalCode" name="postalCode" value="1010" />
                              </div>
                            </div>

                            <div class="col-md-6">
                              <div class="form-group">
                                <label for="country">Country</label>
                                <input type="text" class="form-control" id="country" name="country" value="Indonesia loh yaa" />
                              </div>
                            </div>

                            <div class="col-md-6">
                              <div class="form-group">
                                <label for="mobile">Mobile</label>
                                <input type="text" class="form-control" id="mobile" name="mobile" value="+6282 8888 9910" />
                              </div>
                            </div>
                          </div>

                          <!-- save button -->
                          <div class="row">
                            <div class="col text-right">
                              <button type="submit" class="btn btn-success px-5">Save Now</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap core JavaScript -->
    <script src="/vendor/jquery/jquery.slim.min.js"></script>
    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>

    <!-- script jquery untuk memunculkan dan menghilangkan sidebar menu versi mobile -->
    <script>
      // menargetkan id menu-toggle saat di click
      $('#menu-toggle').click(function (e) {
        e.preventDefault(); // dibuat default dahulu karena kita tidak ingin behaviour tombol yg sebenarnya berjalan
        $('#wrapper').toggleClass('toggled');
      });
    </script>
  </body>
</html>
